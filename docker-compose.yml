services:
  postgres:
    image: postgres:16-alpine
    container_name: gem_fixa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gem_fixa_dev
    ports:
      - "5432:5432"
    volumes:
      - gem_fixa_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gem_fixa_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gem_fixa_data:
    driver: local
